# Task 5-2: 태그 푸시 시 Windows에서 PyInstaller 빌드 후 GitHub Release에 exe 업로드
# 사용: git tag v2.5.3 && git push origin v2.5.3
name: Build and Release (Windows)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: PyInstaller
        run: pyinstaller MAIL_MONSTER_PRO.spec --noconfirm

      # 앱이 자동 업데이트 시 다운로드 무결성 검사(무료) — login.py 가 이 파일명을 찾음
      - name: Write SHA256 sidecar
        shell: pwsh
        run: |
          $h = (Get-FileHash -Path "dist/MAIL_MONSTER_PRO.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path "dist/MAIL_MONSTER_PRO.exe.sha256" -Value $h -Encoding ascii

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MAIL_MONSTER_PRO.exe
            dist/MAIL_MONSTER_PRO.exe.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
