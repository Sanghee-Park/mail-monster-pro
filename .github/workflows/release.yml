# Task 5-2: 태그 푸시 시 Windows에서 PyInstaller 빌드 후 GitHub Release에 exe 업로드
# 사용: git tag v2.5.3 && git push origin v2.5.3
# Release는 "Upload release assets" 단계 직전까지 안 보일 수 있음(PyInstaller 10~20분).
# 태그 푸시 후 실패 시: Actions → 이 워크플로 → Run workflow 로 동일 태그 재실행.
name: Build and Release (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "빌드할 Git 태그 (예: v2.6.7)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: PyInstaller
        run: pyinstaller MAIL_MONSTER_PRO.spec --noconfirm

      # 앱이 자동 업데이트 시 다운로드 무결성 검사(무료) — login.py 가 이 파일명을 찾음
      - name: Write SHA256 sidecar
        shell: pwsh
        run: |
          $h = (Get-FileHash -Path "dist/MAIL_MONSTER_PRO.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path "dist/MAIL_MONSTER_PRO.exe.sha256" -Value $h -Encoding ascii

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MAIL_MONSTER_PRO.exe
            dist/MAIL_MONSTER_PRO.exe.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
